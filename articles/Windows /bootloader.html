  <title>Bootloader Repair</title>
</head>
<body>
  <h1>Windows Bootloader Repair</h1>
  <ol>
    <li>Boot into Windows Recovery Environment.</li>
    <li>Open Command Prompt.</li>
    <li>Run <code>bootrec /fixmbr</code> and <code>bootrec /fixboot</code>.</li>
    <li>Restart and test boot.</li>
  </ol>
</body>
