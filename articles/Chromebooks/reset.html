<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chromebook Factory Reset</title>
</head>
<body>
  <h1>Factory Reset (Powerwash)</h1>
  <ol>
    <li>Sign out of your Chromebook.</li>
    <li>Press <strong>Ctrl + Alt + Shift + R</strong>.</li>
    <li>Select Restart.</li>
    <li>Choose Powerwash and confirm.</li>
  </ol>
</body>
</html>
