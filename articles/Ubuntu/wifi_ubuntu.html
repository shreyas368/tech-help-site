  <title>Ubuntu Wi-Fi Not Working</title>

<body>
  <h1>Fixing Ubuntu Wi-Fi Issues</h1>
  <ol>
    <li>Check if drivers are installed: <code>lshw -C network</code>.</li>
    <li>Install missing drivers via <code>sudo apt install</code>.</li>
    <li>Restart Network Manager: <code>sudo systemctl restart NetworkManager</code>.</li>
    <li>Reconnect to your Wi-Fi network.</li>
  </ol>
</body>
