  <title>Chromebook Wi-Fi Issues</title>

<body>
  <h1>Fixing Chromebook Wi-Fi Problems</h1>
  <ol>
    <li>Check if Wi-Fi is enabled in settings.</li>
    <li>Forget and reconnect to the network.</li>
    <li>Restart your Chromebook.</li>
    <li>If issues persist, reset network settings.</li>
  </ol>
