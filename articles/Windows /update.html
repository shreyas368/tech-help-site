  <title>Windows Update Stuck</title>
</head>
<body>
  <h1>Fixing Stuck Windows Updates</h1>
  <ol>
    <li>Restart your PC and try again.</li>
    <li>Run Windows Update Troubleshooter.</li>
    <li>Clear the SoftwareDistribution folder.</li>
    <li>Run <code>sfc /scannow</code> in Command Prompt.</li>
  </ol>
</body>
